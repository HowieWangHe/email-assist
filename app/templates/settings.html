{% extends "_layout.html" %}

{% block title %}连接配置 - Email Assist{% endblock %}

{% block content %}
<header class="page-header">
  <div>
    <p class="eyebrow">Connections</p>
    <h1>连接配置</h1>
    <p class="meta">数据目录：<code>{{ settings.data_dir }}</code> · 轮询间隔：<code>{{ settings.poll_interval_seconds }}</code> 秒</p>
  </div>
  <a class="button secondary" href="/">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    返回任务列表
  </a>
</header>

<form id="settings-form" class="stack">
  <div class="grid-3">
    <section class="panel panel-pad">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <div style="width:36px;height:36px;border-radius:10px;background:var(--primary-soft);color:var(--primary);display:grid;place-items:center">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <h2 style="margin:0">SMTP 发信</h2>
      </div>
      <label for="smtp-host">服务器</label>
      <input id="smtp-host" name="smtp.host" value="{{ local_config.smtp.host }}" placeholder="smtp.example.com">
      <label for="smtp-port">端口</label>
      <input id="smtp-port" name="smtp.port" type="number" value="{{ local_config.smtp.port or 465 }}">
      <label for="smtp-security">安全协议</label>
      <select id="smtp-security" name="smtp.security">
        <option value="ssl" {% if local_config.smtp.security == "ssl" %}selected{% endif %}>SSL/TLS</option>
        <option value="starttls" {% if local_config.smtp.security == "starttls" %}selected{% endif %}>STARTTLS</option>
        <option value="none" {% if local_config.smtp.security == "none" %}selected{% endif %}>None</option>
      </select>
      <label for="smtp-username">账号</label>
      <input id="smtp-username" name="smtp.username" value="{{ local_config.smtp.username }}" placeholder="buyer@example.com">
      <label for="smtp-password">密码 / 授权码</label>
      <input id="smtp-password" name="smtp.password" type="password" placeholder="{% if local_config.smtp.password_configured %}已保存，留空则不修改{% else %}请输入密码或授权码{% endif %}">
      <div class="actions" style="margin-top:14px">
        <button class="secondary" type="button" data-test="smtp">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          测试 SMTP
        </button>
      </div>
      <div class="status" id="smtp-status"></div>
    </section>

    <section class="panel panel-pad">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <div style="width:36px;height:36px;border-radius:10px;background:var(--blue-soft);color:var(--blue);display:grid;place-items:center">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
        </div>
        <h2 style="margin:0">IMAP 收信</h2>
      </div>
      <label for="imap-host">服务器</label>
      <input id="imap-host" name="imap.host" value="{{ local_config.imap.host }}" placeholder="imap.example.com">
      <label for="imap-port">端口</label>
      <input id="imap-port" name="imap.port" type="number" value="{{ local_config.imap.port or 993 }}">
      <label for="imap-security">安全协议</label>
      <select id="imap-security" name="imap.security">
        <option value="ssl" {% if local_config.imap.security == "ssl" %}selected{% endif %}>SSL/TLS</option>
        <option value="starttls" {% if local_config.imap.security == "starttls" %}selected{% endif %}>STARTTLS</option>
        <option value="none" {% if local_config.imap.security == "none" %}selected{% endif %}>None</option>
      </select>
      <label for="imap-username">账号</label>
      <input id="imap-username" name="imap.username" value="{{ local_config.imap.username }}" placeholder="buyer@example.com">
      <label for="imap-password">密码 / 授权码</label>
      <input id="imap-password" name="imap.password" type="password" placeholder="{% if local_config.imap.password_configured %}已保存，留空则不修改{% else %}请输入密码或授权码{% endif %}">
      <div class="actions" style="margin-top:14px">
        <button class="secondary" type="button" data-test="imap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          测试 IMAP
        </button>
      </div>
      <div class="status" id="imap-status"></div>
    </section>

    <section class="panel panel-pad">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <div style="width:36px;height:36px;border-radius:10px;background:var(--success-soft);color:var(--success);display:grid;place-items:center">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M12 2a10 10 0 0 1 10 10"/><path d="M12 12 2.5 8.5"/></svg>
        </div>
        <h2 style="margin:0">AI API</h2>
      </div>
      <label for="ai-base-url">Base URL</label>
      <input id="ai-base-url" name="ai.base_url" value="{{ local_config.ai.base_url }}" placeholder="https://api.example.com/v1">
      <label for="ai-model">模型</label>
      <input id="ai-model" name="ai.model" value="{{ local_config.ai.model }}" placeholder="quote-model">
      <label for="ai-api-key">API Key</label>
      <input id="ai-api-key" name="ai.api_key" type="password" placeholder="{% if local_config.ai.api_key_configured %}已保存，留空则不修改{% else %}请输入 API Key{% endif %}">
      <div class="actions" style="margin-top:14px">
        <button class="secondary" type="button" data-test="ai">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          测试 AI API
        </button>
      </div>
      <div class="status" id="ai-status"></div>
    </section>
  </div>

  <div class="actions" style="padding:8px 0">
    <button type="submit">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      保存配置
    </button>
    <span class="status" id="save-status"></span>
  </div>
</form>
{% endblock %}

{% block extra_script %}
<script>
  function value(name) {
    const el = document.querySelector(`[name="${name}"]`);
    return el ? el.value : '';
  }
  function payload() {
    return {
      smtp: {
        host: value('smtp.host'),
        port: Number(value('smtp.port') || 0),
        security: value('smtp.security'),
        username: value('smtp.username'),
        password: value('smtp.password')
      },
      imap: {
        host: value('imap.host'),
        port: Number(value('imap.port') || 0),
        security: value('imap.security'),
        username: value('imap.username'),
        password: value('imap.password')
      },
      ai: {
        base_url: value('ai.base_url'),
        model: value('ai.model'),
        api_key: value('ai.api_key')
      }
    };
  }
  function showTestStatus(id, result) {
    const el = document.getElementById(id);
    el.className = `status ${result.ok ? 'ok' : 'fail'}`;
    el.textContent = result.message || (result.ok ? '连接成功' : '连接失败');
  }

  document.getElementById('settings-form').addEventListener('submit', async (event) => {
    event.preventDefault();
    const btn = event.submitter;
    setLoading(btn, true, '保存配置');
    const { response, data } = await postJSON('/api/settings', payload());
    setLoading(btn, false);
    const el = document.getElementById('save-status');
    if (!response.ok) {
      el.className = 'status fail';
      el.textContent = data.error || '保存失败';
      toast('保存失败', 'error');
      return;
    }
    el.className = 'status ok';
    el.textContent = '配置已保存';
    toast('配置已保存', 'success');
  });

  document.querySelectorAll('[data-test]').forEach((button) => {
    button.addEventListener('click', async () => {
      const kind = button.dataset.test;
      const data = payload()[kind];
      showTestStatus(`${kind}-status`, { ok: true, message: '正在测试…' });
      setLoading(button, true, button.textContent.trim());
      const { response, data: result } = await postJSON(`/api/settings/test/${kind}`, data);
      setLoading(button, false);
      showTestStatus(`${kind}-status`, result);
      toast(result.message || (result.ok ? '测试通过' : '测试失败'), result.ok ? 'success' : 'error');
    });
  });
</script>
{% endblock %}
