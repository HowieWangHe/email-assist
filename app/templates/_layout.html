<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Email Assist{% endblock %}</title>
    <link rel="stylesheet" href="/static/app.css?v=20260507b">
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <div class="app-shell">
      {% include "_sidebar.html" %}
      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>

    <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

    <div id="confirm-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="confirm-title" style="display:none">
      <div class="modal-backdrop"></div>
      <div class="modal-panel">
        <h3 id="confirm-title" class="modal-title">确认操作</h3>
        <p id="confirm-message" class="modal-message"></p>
        <div id="confirm-input-wrap" style="display:none">
          <input id="confirm-input" type="text" class="modal-input" placeholder="请输入确认文本">
        </div>
        <div class="modal-actions">
          <button id="confirm-cancel" type="button" class="secondary">取消</button>
          <button id="confirm-ok" type="button" class="danger">确认</button>
        </div>
      </div>
    </div>

    <div id="preview-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="preview-title" style="display:none">
      <div class="modal-backdrop"></div>
      <div class="modal-panel preview-panel">
        <div class="preview-head">
          <h3 id="preview-title" class="modal-title">预览</h3>
          <button id="preview-close" type="button" class="secondary small">关闭</button>
        </div>
        <div id="preview-body" class="preview-body"></div>
      </div>
    </div>

    <script src="/static/app.js?v=20260507b"></script>
    {% block extra_script %}{% endblock %}
  </body>
</html>
